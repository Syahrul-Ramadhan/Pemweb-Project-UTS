<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/home.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <!-- NAVBAR START -->
    <nav class="navbar">
      <div class="nav-responsive">
        <div class="burger-menu">
          <span></span>
        </div>
        <div class="logo">
          <a href="#">SaPres</a>
        </div>
      </div>

      <div class="nav-content">
        <div class="menu-responsive">
          <ul>
            <li><a href="#">Beasiswa</a></li>
            <li><a href="#">Lomba</a></li>
            <li><a href="#">Cari Tim</a></li>
            <li><a href="#">Forum</a></li>
            <li><a href="login.html">MASUK</a></li>
            <li>
              <a href="register.html" class="btn-register register-responsive"
                >DAFTAR</a
              >
            </li>
          </ul>
        </div>
        <div class="close-nav"></div>
        <div class="nav-menu">
          <ul class="nav-list">
            <li><a href="#">Beasiswa</a></li>
            <li><a href="#">Lomba</a></li>
            <li><a href="#">Cari Tim</a></li>
            <li><a href="#">Forum</a></li>
          </ul>
        </div>
      </div>
      <div class="search-container">
        <div class="search-bar">
          <input
            type="text"
            placeholder="Ketik nama beasiswa/lomba yang ingin kamu cari"
          />
        </div>
        <div class="search-btn">Cari</div>
      </div>
      <div class="search-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="24"
          height="24"
          color="#333332"
          fill="none"
        >
          <path
            d="M17.5 17.5L22 22"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M20 11C20 6.02944 15.9706 2 11 2C6.02944 2 2 6.02944 2 11C2 15.9706 6.02944 20 11 20C15.9706 20 20 15.9706 20 11Z"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linejoin="round"
          />
        </svg>
      </div>
      <div class="auth-buttons">
        <button class="btn btn-login">MASUK</button>
        <button class="btn btn-register">DAFTAR</button>
      </div>
    </nav>
    <!-- NAVBAR END -->

    <!-- CAROUSEL START -->
    <div class="carousel-container">
      <div class="prev-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="24"
          height="24"
          color="#333332"
          fill="none"
        >
          <path
            d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>
      <div class="carousel">
        <div class="slide">
          <img
            src="../assets/img/Poster home/Beasiswa.png"
            alt="Poster Beasiswa"
          />
        </div>
        <div class="slide">
          <img src="../assets/img/Poster home/Lomba.png" alt="Poster Lomba" />
        </div>
        <div class="slide">
          <img
            src="../assets/img/Poster home/Cari Tim.png"
            alt="Poster Cari Tim"
          />
        </div>
        <div class="slide">
          <img src="../assets/img/Poster home/Forum.png" alt="Poster Forum" />
        </div>
      </div>
      <div class="next-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="24"
          height="24"
          color="#333332"
          fill="none"
        >
          <path
            d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>
    </div>
    <!-- CAROUSEL END -->

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/home.js"></script>
  </body>
</html>
